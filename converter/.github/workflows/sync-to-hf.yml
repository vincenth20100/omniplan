name: Sync to Hugging Face Space
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://vincentheloin:$HF_TOKEN@huggingface.co/spaces/vincentheloin/omniplan-converter
          git push hf main --force
